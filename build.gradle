buildscript {
    repositories {
        maven { url "${rootDir}/local-repo" }
        mavenCentral()
        maven {
            name = "forge"
            url = "https://maven.minecraftforge.net/"
        }
        maven {
            name = "sonatype"
            url = "https://oss.sonatype.org/content/repositories/snapshots/"
        }
    }
    dependencies {
        classpath 'net.minecraftforge.gradle:ForgeGradle:1.2-SNAPSHOT'
    }
}

apply plugin: 'forge'

version = '2.1.1'
group = 'ru.defea.oneblockultima'
archivesBaseName = 'OneBlockUltima-forge-1.7.10'

minecraft {
    version = "1.7.10-10.13.4.1614-1.7.10"
    runDir = "eclipse"
}

dependencies {
    testCompile 'junit:junit:4.13.2'
}

processResources {
    inputs.property 'version', project.version
    inputs.property 'mcversion', '1.7.10'

    from(sourceSets.main.resources.srcDirs) {
        include 'mcmod.info'
        expand 'version': project.version, 'mcversion': '1.7.10'
    }

    from(sourceSets.main.resources.srcDirs) {
        exclude 'mcmod.info'
    }
}

jar {
    manifest {
        attributes 'FMLModType': 'FMLMod'
    }
}
