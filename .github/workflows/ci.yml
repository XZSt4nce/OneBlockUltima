name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Read mod version and java version
        id: version
        run: |
          VERSION=$(grep "^version = " build.gradle | sed "s/version = '\(.*\)'/\1/" | tr -d ' \r\n')
          JAVA_VER=$(grep "^ci.java.version=" gradle.properties | cut -d'=' -f2 | tr -d ' \r\n')
          echo "mod_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "java_version=$JAVA_VER" >> "$GITHUB_OUTPUT"

      - name: Check versions.json
        id: check
        run: |
          VERSION="${{ steps.version.outputs.mod_version }}"
          RESPONSE=$(curl -sf "https://raw.githubusercontent.com/XZSt4nce/OneBlockUltima/main/versions.json" || echo '{}')
          EXISTS=$(echo "$RESPONSE" | jq --arg v "$VERSION" '[.[] | objects | has($v)] | any')
          echo "exists=$EXISTS" >> "$GITHUB_OUTPUT"
          echo "Version $VERSION exists in versions.json: $EXISTS"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ steps.version.outputs.java_version }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew runTests

      - name: Build mod
        if: steps.check.outputs.exists == 'false'
        run: ./gradlew build

      - name: Find jar
        if: steps.check.outputs.exists == 'false'
        id: jar
        run: |
          JAR=$(find build/libs -name '*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | head -1)
          echo "path=$JAR" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: forge-${{ github.base_ref }}-${{ steps.version.outputs.mod_version }}
          name: ${{ github.event.pull_request.title }}
          body: ${{ github.event.pull_request.body }}
          files: ${{ steps.jar.outputs.path }}
          draft: false
          prerelease: false

      - name: Auto-approve and merge
        if: steps.check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review "${{ github.event.pull_request.number }}" --approve
          gh pr merge "${{ github.event.pull_request.number }}" --squash --auto
